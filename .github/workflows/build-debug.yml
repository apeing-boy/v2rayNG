name: Build Debug APK
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;28.2.13676358"
          echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV

      - name: Build hev-socks5-tunnel
        run: bash compile-hevtun.sh

      - name: Copy libhevtun
        run: cp -r libs V2rayNG/app/

      - name: Fetch AndroidLibXrayLite tag
        run: |
          cd AndroidLibXrayLite
          git fetch --tags
          CURRENT_TAG=$(git describe --tags --abbrev=0)
          echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_ENV

      - name: Download libv2ray.aar
        uses: robinraju/release-downloader@v1.12
        with:
          repository: 2dust/AndroidLibXrayLite
          tag: ${{ env.CURRENT_TAG }}
          fileName: libv2ray.aar
          out-file-path: V2rayNG/app/libs/

      - name: Build debug APK
        working-directory: V2rayNG
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: v2rayNG-debug
          path: V2rayNG/app/build/outputs/apk/debug/*.apk
